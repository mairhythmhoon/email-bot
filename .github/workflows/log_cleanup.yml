name: Monthly Log Cleanup

on:
  # Runs on 1st day of every month at 6:00 AM IST
  schedule:
    - cron: "30 0 1 * *"

  # Manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  cleanup_logs:
    name: Clear old log files
    runs-on: ubuntu-latest

    # Enable latest JavaScript runtime for GitHub Actions
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    permissions:
      contents: write

    steps:
      #Show Trigger informations.
      - name: Show trigger info
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "UTC Time: $(date -u)"
          echo "IST Time: $(TZ=Asia/Kolkata date)"

      # Step 1: Checkout repository files
      - name: Checkout repository
        uses: actions/checkout@v5

      # Step 2: Clear all .log files in Logs folder
      - name: Clean log files
        run: |
          if [ ! -d "Logs" ]; then
            echo "Logs folder not found."
            exit 0
          fi

          IST_TIME=$(TZ=Asia/Kolkata date "+%d-%m-%Y %I:%M:%S %p IST")

          find Logs -type f -name "*.log" | while read -r file; do
            {
              echo "This is removed by scheduler"
              echo "Cleanup Time: $IST_TIME"
            } > "$file"

            echo "Cleaned: $file"
          done

      # Step 3: Commit changes only if needed
      - name: Commit changes
        run: |
          git config --global user.name "mairhythmhoon"
          git config --global user.email "rhythm.work.id@proton.me"

          git add Logs/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Monthly cleanup of log files"
          fi

      # Step 4: Push updated files
      - name: Push changes
        run: git push