name: Run App

on:
  push:
    branches:
      - main
  schedule:
    - cron: "30 2 * * *"   # 8:00 AM IST

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Create Secure folder
        run: mkdir -p Secure

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > Secure/.env

      - name: Create credentials.json safely
        run: |
          printf '%s' '${{ secrets.CREDENTIALS_JSON }}' > Secure/credentials.json

      - name: Run Python task
        run: python task01.py

      - name: Commit & Push changes
        run: |
          git add .
          git commit -m "Auto update: $(date)" || echo "No changes to commit"
          git push