name: Run App

on:
  push:
    branches:
      - main

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Secure folder
        run: mkdir -p Secure

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE }}" > Secure/.env

      - name: Create credentials.json safely
        run: |
          printf '%s' '${{ secrets.CREDENTIALS_JSON }}' > Secure/credentials.json

      - name: Run Python file
        run: python main.py